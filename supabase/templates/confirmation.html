<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#fbf4ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fbf4ee;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;background:#ffffff;border-radius:20px;padding:36px 32px;box-shadow:0 8px 30px rgba(120,80,60,0.08);">
            <tr>
              <td align="center" style="font-size:26px;font-weight:800;color:#2b211c;letter-spacing:-0.5px;padding-bottom:6px;">
                para//ax
              </td>
            </tr>
            <tr>
              <td align="center" style="font-size:15px;color:#7a6a5f;line-height:22px;padding-bottom:26px;">
                One tap and you're in.
              </td>
            </tr>
            <tr>
              <td align="center" style="font-size:20px;font-weight:700;color:#2b211c;line-height:28px;padding-bottom:14px;">
                Confirm your email
              </td>
            </tr>
            <tr>
              <td align="center" style="font-size:15px;color:#5c4f46;line-height:23px;padding-bottom:28px;">
                Tap below to finish setting up your account and meet your person.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:24px;">
                <a href="parallax://auth-callback?token_hash={{ .TokenHash }}&type=signup"
                   style="display:inline-block;background:#2b211c;color:#ffffff;text-decoration:none;font-size:16px;font-weight:700;padding:15px 34px;border-radius:999px;">
                  Confirm my email
                </a>
              </td>
            </tr>
            <tr>
              <td align="center" style="font-size:12px;color:#a3958a;line-height:18px;">
                If you didn't create a Parallax account, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
