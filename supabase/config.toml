# Supabase configuration for Parallax
project_id = "parallax"

[api]
enabled = true
max_rows = 1000

[db]
major_version = 15

[realtime]
enabled = true

[auth]
enabled = true

[storage]
enabled = true
file_size_limit = 52428800

# Refocus AI mediation — JWT off for local/demo serving. Production should gate
# this (auth or rate-limit) since it spends Anthropic tokens per call.
[functions.refocus]
verify_jwt = false
