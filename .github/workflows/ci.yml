name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm install --legacy-peer-deps
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test -- --ci
